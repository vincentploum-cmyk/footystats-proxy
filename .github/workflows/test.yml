name: test

# Runs the pre-game freeze-invariant tests (and a syntax check) on every PR and
# on push to main. A red result flags any change that re-introduces look-ahead.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Syntax check
        run: |
          node --check server.js
          node --check lib/freeze.js
      - name: Freeze-invariant tests
        run: npm test
