name: Keep Alive

on:
  schedule:
    # Every 10 min. Render free tier spins down after 15 min of inactivity,
    # and GitHub Actions cron is "best effort" (can be delayed several minutes
    # under load), so we run more frequently than the spin-down threshold.
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  request:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ping Render
        run: ./scripts/keep-awake.sh
